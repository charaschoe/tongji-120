<!doctype html>
<html lang="de">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Tongji 120 · Poster Generator</title>
		<script>
			window.va =

		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			:root {
				--red: #e8190c;
				--blue: #1a5cbe;
				--gold: #e8c340;
				--bg: #111010;
				--panel: #181818;
				--line: #2a2a2a;
				--muted: #555;
				--dim: #888;
				--text: #e8e8e8;
			}
			html,
			body {
				font-family: "Times New Roman", Times, serif;
			}
			body {
				background: var(--bg);
				color: var(--text);
				font-family: "Times New Roman", Times, serif;
				display: flex;
				height: 100vh;
				overflow: hidden;
			}
			#canvas-wrap {
				flex: 1;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 24px;
				background:
					repeating-linear-gradient(
						0deg,
						transparent,
						transparent 40px,
						rgba(255, 255, 255, 0.015) 40px,
						rgba(255, 255, 255, 0.015) 41px
					),
					repeating-linear-gradient(
						90deg,
						transparent,
						transparent 40px,
						rgba(255, 255, 255, 0.015) 40px,
						rgba(255, 255, 255, 0.015) 41px
					);
			}
			canvas {
				max-width: min(100%, 600px);
				max-height: min(100%, 600px);
				aspect-ratio: 1;
				box-shadow:
					0 0 0 1px var(--line),
					0 30px 80px rgba(0, 0, 0, 0.7);
			}
			#panel {
				width: 260px;
				min-width: 260px;
				background: var(--panel);
				border-left: 1px solid var(--line);
				overflow-y: auto;
				display: flex;
				flex-direction: column;
			}
			.p-head {
				padding: 20px 20px 16px;
				border-bottom: 1px solid var(--line);
			}
			.p-head h1 {
				font-size: 11px;
				letter-spacing: 3px;
				text-transform: uppercase;
				color: var(--gold);
			}
			.p-head p {
				font-size: 9px;
				color: var(--muted);
				margin-top: 4px;
				letter-spacing: 1.5px;
			}
			.seed {
				font-size: 8px;
				color: #333;
				margin-top: 10px;
				letter-spacing: 1px;
				cursor: pointer;
			}
			.seed:hover {
				color: var(--muted);
			}
			.section {
				padding: 16px 20px;
				border-bottom: 1px solid var(--line);
				display: flex;
				flex-direction: column;
				gap: 14px;
			}
			.ctrl label {
				display: flex;
				justify-content: space-between;
				align-items: baseline;
				font-size: 9px;
				letter-spacing: 1.5px;
				text-transform: uppercase;
				color: var(--dim);
				margin-bottom: 7px;
			}
			.ctrl label span {
				color: var(--gold);
				font-size: 10px;
			}
			input[type="range"] {
				-webkit-appearance: none;
				width: 100%;
				height: 2px;
				background: var(--line);
				outline: none;
				border-radius: 0;
			}
			input[type="range"]::-webkit-slider-thumb {
				-webkit-appearance: none;
				width: 12px;
				height: 12px;
				background: var(--gold);
				border-radius: 0;
				cursor: pointer;
			}
			.pills {
				display: flex;
				flex-wrap: wrap;
				gap: 5px;
			}
			.pill {
				padding: 4px 10px;
				border: 1px solid var(--line);
				background: transparent;
				color: var(--muted);
				font-family: "Times New Roman", Times, serif;
				font-size: 8px;
				letter-spacing: 1px;
				text-transform: uppercase;
				cursor: pointer;
				transition: all 0.15s;
			}
			.pill:hover {
				border-color: var(--dim);
				color: var(--text);
			}
			.pill.on {
				border-color: var(--gold);
				color: var(--gold);
			}
			.actions {
				padding: 16px 20px;
				display: flex;
				flex-direction: column;
				gap: 8px;
				margin-top: auto;
			}
			.btn {
				padding: 10px 14px;
				font-family: "Times New Roman", Times, serif;
				font-size: 9px;
				letter-spacing: 2px;
				text-transform: uppercase;
				cursor: pointer;
				transition: all 0.15s;
				border: 1px solid var(--line);
				background: transparent;
				color: var(--dim);
			}
			.btn:hover {
				border-color: var(--dim);
				color: var(--text);
			}
			.btn.primary {
				border-color: var(--gold);
				color: var(--gold);
			}
			.btn.primary:hover {
				background: var(--gold);
				color: #000;
			}
			#status {
				font-size: 8px;
				color: var(--muted);
				letter-spacing: 1px;
				text-align: center;
				padding: 8px;
				opacity: 0;
				transition: opacity 0.3s;
			}
			#status.show {
				opacity: 1;
			}
		</style>
	</head>
	<body>
		<div id="canvas-wrap">
			<canvas id="c" width="800" height="800"></canvas>
		</div>

		<div id="panel">
			<div class="p-head">
				<h1>Poster Generator</h1>
				<p>同济大学 · 120th Anniversary</p>
				<div class="seed" id="seed-el" title="Click to copy">
					SEED: ——
				</div>
			</div>

			<div class="section">
				<div class="ctrl">
					<label>Rotation Speed <span id="v-speed">0.30</span></label>
					<input
						type="range"
						id="s-speed"
						min="0"
						max="200"
						value="30"
					/>
				</div>
				<div class="ctrl">
					<label>Layer Count <span id="v-layers">12</span></label>
					<input
						type="range"
						id="s-layers"
						min="1"
						max="30"
						value="12"
					/>
				</div>
				<div class="ctrl">
					<label>Layer Depth <span id="v-depth">6</span></label>
					<input
						type="range"
						id="s-depth"
						min="1"
						max="25"
						value="6"
					/>
				</div>
				<div class="ctrl">
					<label>Scale <span id="v-scale">1.0×</span></label>
					<input
						type="range"
						id="s-scale"
						min="40"
						max="180"
						value="100"
					/>
				</div>
				<div class="ctrl">
					<label>Tilt Angle <span id="v-tilt">25°</span></label>
					<input
						type="range"
						id="s-tilt"
						min="0"
						max="90"
						value="25"
					/>
				</div>
			</div>

			<div class="section">
				<div class="ctrl">
					<label>Layout Mode</label>
					<div class="pills">
						<button class="pill on" data-logo="deconstructed">
							Deconstructed
						</button>
						<button class="pill" data-logo="unified">
							Unified
						</button>
					</div>
				</div>
				<div class="ctrl">
					<label>Color Mode</label>
					<div class="pills">
						<button class="pill on" data-mode="brand">Brand</button>
						<button class="pill" data-mode="rainbow">
							Rainbow
						</button>
						<button class="pill" data-mode="neon">Neon</button>
						<button class="pill" data-mode="mono">Mono</button>
						<button class="pill" data-mode="cmyk">CMYK</button>
					</div>
				</div>
				<div class="ctrl">
					<label>Background</label>
					<div class="pills">
						<button class="pill on" data-bg="dark">Dark</button>
						<button class="pill" data-bg="cream">Cream</button>
						<button class="pill" data-bg="white">White</button>
						<button class="pill" data-bg="red">Red</button>
						<button class="pill" data-bg="blue">Blue</button>
					</div>
				</div>
			</div>

			<div class="actions">
				<button class="btn" id="btn-rand">↻ &nbsp;Randomize</button>
				<button class="btn" id="btn-pause">⏸ &nbsp;Pause</button>
				<button class="btn primary" id="btn-dl">
					↓ &nbsp;Download PNG
				</button>
				<div id="status">Saved!</div>
			</div>
		</div>

		<script>
			const canvas = document.getElementById("c");
			const ctx = canvas.getContext("2d");
			const W = canvas.width,
				H = canvas.height;

			let P = {
				logo: "deconstructed",
				speed: 0.3,
				layers: 12,
				depth: 6,
				scale: 1.0,
				tilt: 25,
				mode: "brand",
				bg: "dark",
				angle: 0,
				paused: false,
			};

			// ─── SHAPES ────────────────────────────────────────────────

			const unifiedPaths = {
				blue: new Path2D(
					"M690.721 368.311C690.721 368.311 678.179 347.334 629.883 360.469C599.051 368.842 577.789 381.493 548.074 390.349C544.313 391.466 539.994 390.312 537.759 387.075C535.525 383.837 536.94 380.898 538.318 378.181C565.538 325.455 625.675 268.597 638.373 209.321C647.719 165.711 650.921 112.389 626.867 72.6109C602.812 32.8332 575.409 14.4685 503.521 14.4688C463.409 14.4689 428.879 44.7404 400.319 67.0294C365.428 94.2673 341.151 132.193 310.37 168.83C304.524 175.788 308.508 184.384 317.222 184.421C326.754 184.495 420.021 184.421 420.021 184.421C420.021 184.421 403.021 155.876 420.021 125.092C428.341 110.026 445.521 86.2846 478.521 86.2846C505.934 86.2846 529.861 119.726 520.222 155.884C511.31 189.312 501.377 201.884 479.074 228.261C430.722 285.45 395.543 321.287 363.222 360.469C327.102 404.303 309.565 431.085 294.722 462.723C286.711 479.798 278.28 535.884 294.722 554.967C294.722 554.967 352.758 554.149 363.222 554.967C373.685 555.786 479.074 554.967 479.074 554.967H537.759",
				),
				red: new Path2D(
					"M118.021 66.4696C81.517 109.956 58.0885 144.958 28.8073 179.285C26.5744 181.903 28.4148 185.97 31.8555 185.97L61.5207 185.97L114.05 185.97C116.605 185.97 118.52 188.247 117.97 190.742C97.3409 284.226 49.4422 491.246 50.0214 510.47C50.7399 534.321 53.3877 549.705 77.6587 550.442C78.8327 550.478 79.8662 550.063 80.6258 549.168C94.2126 533.144 228.603 374.5 229.021 367.97C229.461 361.092 265.543 167.886 268.193 126.503C271.086 81.3262 279.02 11.9691 219.521 11.969C160.022 11.9689 156.896 20.1578 118.021 66.4696Z",
				),
				gold: new Path2D(
					"M989.521 17.9675C909.773 -1.69114 792.338 109.588 732.522 246.117C664.021 402.467 689.979 551.968 828.522 551.968C853.73 551.968 896.021 540.968 927.021 516.468C958.021 491.968 984.521 476.968 1026.52 408.468C1035.79 393.348 1058.65 347.968 1064.52 306.468C1086.52 150.968 1069.31 37.6641 989.521 17.9675ZM979.021 260.468C957.521 352.468 918.021 427.071 818.314 402.468C763.021 388.824 748.021 304.468 797.021 221.468C846.021 138.468 898.021 85.9678 943.021 85.9678C988.022 85.9678 1000.52 168.468 979.021 260.468Z",
				),
			};

			const glyphCenters = {
				red: { x: 159, y: 282 },
				blue: { x: 493, y: 285 },
				gold: { x: 909, y: 285 },
			};

			const deconstructedPaths = {
				red: new Path2D(),
				blue: new Path2D(),
				gold: new Path2D(),
			};
			deconstructedPaths.red.addPath(
				unifiedPaths.red,
				new DOMMatrix().translateSelf(
					-glyphCenters.red.x,
					-glyphCenters.red.y,
				),
			);
			deconstructedPaths.blue.addPath(
				unifiedPaths.blue,
				new DOMMatrix().translateSelf(
					-glyphCenters.blue.x,
					-glyphCenters.blue.y,
				),
			);
			deconstructedPaths.gold.addPath(
				unifiedPaths.gold,
				new DOMMatrix().translateSelf(
					-glyphCenters.gold.x,
					-glyphCenters.gold.y,
				),
			);

			function pathOne(ctx) {
				// Bold italic "1" — main stroke + wing
				ctx.beginPath();
				ctx.moveTo(8, -88);
				ctx.bezierCurveTo(24, -85, 30, -58, 26, -24);
				ctx.bezierCurveTo(22, 10, 20, 42, 22, 84);
				ctx.lineTo(-10, 84);
				ctx.bezierCurveTo(-16, 42, -18, 8, -20, -24);
				ctx.bezierCurveTo(-22, -58, -14, -84, 8, -88);
				ctx.closePath();
				// Wing
				ctx.moveTo(-4, -62);
				ctx.bezierCurveTo(-16, -70, -36, -66, -44, -52);
				ctx.bezierCurveTo(-40, -40, -22, -43, -8, -45);
				ctx.closePath();
			}

			function pathTwo(ctx) {
				// Flowing cursive "2"
				ctx.beginPath();
				ctx.moveTo(-30, -40);
				ctx.bezierCurveTo(-32, -85, 8, -95, 30, -68);
				ctx.bezierCurveTo(52, -42, 36, -8, 14, 14);
				ctx.bezierCurveTo(-4, 32, -16, 50, 0, 64);
				ctx.lineTo(44, 64);
				ctx.lineTo(44, 84);
				ctx.lineTo(-44, 84);
				ctx.lineTo(-44, 62);
				ctx.bezierCurveTo(-28, 46, -14, 28, 6, 10);
				ctx.bezierCurveTo(20, -6, 18, -30, 4, -44);
				ctx.bezierCurveTo(-10, -58, -26, -54, -30, -40);
				ctx.closePath();
			}

			function pathCircle(ctx, r) {
				ctx.beginPath();
				ctx.arc(0, 0, r, 0, Math.PI * 2);
				ctx.closePath();
			}

			// ─── COLORS ───────────────────────────────────────────────

			const BASE = { red: "#E8190C", blue: "#1A5CBE", gold: "#E8C340" };

			function hexToRgb(h) {
				const r = parseInt(h.slice(1, 3), 16),
					g = parseInt(h.slice(3, 5), 16),
					b = parseInt(h.slice(5, 7), 16);
				return [r, g, b];
			}
			function brightness(hex, f) {
				const [r, g, b] = hexToRgb(hex);
				return `rgb(${~~(r * f)},${~~(g * f)},${~~(b * f)})`;
			}

			function layerColors(base, n, mode, idx) {
				const out = [];
				for (let i = 0; i < n; i++) {
					const t = i / Math.max(n - 1, 1);
					if (mode === "brand") {
						out.push(brightness(base, 0.15 + t * 0.85));
					} else if (mode === "rainbow") {
						out.push(
							`hsl(${(idx * 120 + (i * 360) / n) % 360},88%,${25 + t * 45}%)`,
						);
					} else if (mode === "neon") {
						const hues = [0, 290, 185];
						out.push(
							`hsl(${(hues[idx % 3] + i * 20) % 360},100%,${18 + t * 52}%)`,
						);
					} else if (mode === "mono") {
						out.push(`hsl(0,0%,${8 + t * 60}%)`);
					} else if (mode === "cmyk") {
						const pairs = [
							[0, 80],
							[200, 70],
							[50, 65],
						];
						const [h, s] = pairs[idx % 3];
						out.push(`hsl(${h},${s}%,${10 + t * 55}%)`);
					}
				}
				return out;
			}

			// ─── DRAW LAYERED ─────────────────────────────────────────

			function layered(
				fn,
				cx,
				cy,
				sc,
				n,
				depth,
				tiltRad,
				angleRad,
				mode,
				idx,
				base,
			) {
				const colors = layerColors(base, n, mode, idx);
				const dx = Math.cos(angleRad);
				const dy = -Math.sin(angleRad) * Math.sin(tiltRad);

				for (let i = n - 1; i >= 0; i--) {
					ctx.save();
					ctx.translate(cx + dx * i * depth, cy + dy * i * depth);
					ctx.scale(sc, sc);
					ctx.fillStyle = colors[i];
					fn(ctx);
					ctx.fill();
					ctx.restore();
				}
			}

			function layeredPath(
				path,
				cx,
				cy,
				sc,
				n,
				depth,
				tiltRad,
				angleRad,
				mode,
				idx,
				base,
			) {
				const colors = layerColors(base, n, mode, idx);
				const dx = Math.cos(angleRad);
				const dy = -Math.sin(angleRad) * Math.sin(tiltRad);

				for (let i = n - 1; i >= 0; i--) {
					ctx.save();
					ctx.translate(cx + dx * i * depth, cy + dy * i * depth);
					ctx.scale(sc, sc);
					ctx.fillStyle = colors[i];
					ctx.fill(path);
					ctx.restore();
				}
			}

			// ─── RENDER ───────────────────────────────────────────────

			const BG_COLORS = {
				dark: "#0e0d0d",
				cream: "#F4EDD8",
				white: "#F8F8F6",
				red: "#D41008",
				blue: "#0F3A8A",
			};
			const TEXT_ON = {
				dark: "rgba(255,255,255,0.9)",
				cream: "rgba(0,0,0,0.85)",
				white: "rgba(0,0,0,0.85)",
				red: "rgba(255,255,255,0.9)",
				blue: "rgba(255,255,255,0.9)",
			};

			function render() {
				const bg = BG_COLORS[P.bg];
				ctx.fillStyle = bg;
				ctx.fillRect(0, 0, W, H);

				const sc = P.scale;
				const cx = W * 0.5;
				const cy = H * 0.47;
				const tRad = (P.tilt * Math.PI) / 180;

				if (P.logo === "deconstructed") {
					const glyphScale = sc * 0.33;
					// Circle (back)
					layeredPath(
						deconstructedPaths.gold,
						cx + 190 * sc,
						cy - 22 * sc,
						glyphScale,
						P.layers,
						P.depth,
						tRad,
						P.angle,
						P.mode,
						2,
						BASE.gold,
					);

					// Blue 2 (middle)
					layeredPath(
						deconstructedPaths.blue,
						cx + 30 * sc,
						cy,
						glyphScale,
						P.layers,
						P.depth,
						tRad,
						P.angle,
						P.mode,
						1,
						BASE.blue,
					);

					// Red 1 (front/left)
					layeredPath(
						deconstructedPaths.red,
						cx - 132 * sc,
						cy,
						glyphScale,
						P.layers,
						P.depth,
						tRad,
						P.angle,
						P.mode,
						0,
						BASE.red,
					);
				} else {
					ctx.save();
					// Center the 1074x561 logo bbox before layered drawing.
					const bboxW = 1074;
					const bboxH = 561;
					// Normal scale applies to individual shapes around their given center.
					// They all share the center cx, cy.
					const unifiedScale = sc * 0.42;

					const wC = bboxW / 2;
					const hC = bboxH / 2;

					const drawB = (c) => {
						c.translate(-wC, -hC);
						c.fill(unifiedPaths.blue);
					};
					const drawR = (c) => {
						c.translate(-wC, -hC);
						c.fill(unifiedPaths.red);
					};
					const drawG = (c) => {
						c.translate(-wC, -hC);
						c.fill(unifiedPaths.gold);
					};

					layered(
						drawG,
						cx,
						cy - 30 * sc,
						unifiedScale,
						P.layers,
						P.depth,
						tRad,
						P.angle,
						P.mode,
						2,
						BASE.gold,
					);
					layered(
						drawB,
						cx,
						cy - 30 * sc,
						unifiedScale,
						P.layers,
						P.depth,
						tRad,
						P.angle,
						P.mode,
						1,
						BASE.blue,
					);
					layered(
						drawR,
						cx,
						cy - 30 * sc,
						unifiedScale,
						P.layers,
						P.depth,
						tRad,
						P.angle,
						P.mode,
						0,
						BASE.red,
					);

					ctx.restore();
				}

				// Text
				const tc = TEXT_ON[P.bg];
				ctx.save();
				ctx.fillStyle = tc;
				ctx.font = `bold 20px 'Times New Roman', Times, serif`;
				ctx.textAlign = "center";
				ctx.fillText("同济大学建校纪念日", cx, H * 0.87);
				ctx.font = `10px 'Times New Roman', Times, serif`;
				ctx.fillStyle = tc.replace("0.9", "0.4").replace("0.85", "0.4");
				ctx.fillText(
					"THE 120TH ANNIVERSARY OF TONGJI UNIVERSITY",
					cx,
					H * 0.91,
				);
				ctx.restore();
			}

			// ─── LOOP ─────────────────────────────────────────────────

			let seed = Math.random().toString(36).slice(2, 8).toUpperCase();
			document.getElementById("seed-el").textContent = "SEED: " + seed;

			function loop() {
				if (!P.paused) P.angle += P.speed * 0.01;
				render();
				requestAnimationFrame(loop);
			}
			loop();

			// ─── CONTROL HELPERS ──────────────────────────────────────

			function slider(id, valId, key, fmt) {
				const el = document.getElementById(id);
				const vl = document.getElementById(valId);
				el.addEventListener("input", () => {
					const v = parseFloat(el.value);
					P[key] = fmt ? fmt(v) : v;
					vl.textContent = fmt
						? fmt(v).toFixed(2) +
							(key === "scale" ? "×" : key === "speed" ? "" : "")
						: Math.round(v) + (key === "tilt" ? "°" : "");
				});
			}
			slider("s-speed", "v-speed", "speed", (v) => (v / 100) * 3);
			slider("s-layers", "v-layers", "layers");
			slider("s-depth", "v-depth", "depth");
			slider("s-scale", "v-scale", "scale", (v) => v / 100);
			slider("s-tilt", "v-tilt", "tilt");

			document.querySelectorAll("[data-mode]").forEach((b) => {
				b.addEventListener("click", () => {
					document
						.querySelectorAll("[data-mode]")
						.forEach((x) => x.classList.remove("on"));
					b.classList.add("on");
					P.mode = b.dataset.mode;
				});
			});
			document.querySelectorAll("[data-logo]").forEach((b) => {
				b.addEventListener("click", () => {
					document
						.querySelectorAll("[data-logo]")
						.forEach((x) => x.classList.remove("on"));
					b.classList.add("on");
					P.logo = b.dataset.logo;
				});
			});
			document.querySelectorAll("[data-bg]").forEach((b) => {
				b.addEventListener("click", () => {
					document
						.querySelectorAll("[data-bg]")
						.forEach((x) => x.classList.remove("on"));
					b.classList.add("on");
					P.bg = b.dataset.bg;
				});
			});

			document
				.getElementById("btn-rand")
				.addEventListener("click", () => {
					P.layers = ~~(4 + Math.random() * 26);
					P.depth = 2 + Math.random() * 18;
					P.scale = 0.6 + Math.random() * 0.9;
					P.speed = Math.random() * 2.5;
					P.tilt = Math.random() * 80;
					const modes = ["brand", "rainbow", "neon", "mono", "cmyk"];
					P.mode = modes[~~(Math.random() * modes.length)];

					document.getElementById("s-layers").value = P.layers;
					document.getElementById("s-depth").value = P.depth;
					document.getElementById("s-scale").value = P.scale * 100;
					document.getElementById("s-speed").value =
						(P.speed / 3) * 100;
					document.getElementById("s-tilt").value = P.tilt;

					document.getElementById("v-layers").textContent =
						~~P.layers;
					document.getElementById("v-depth").textContent = ~~P.depth;
					document.getElementById("v-scale").textContent =
						P.scale.toFixed(2) + "×";
					document.getElementById("v-speed").textContent =
						P.speed.toFixed(2);
					document.getElementById("v-tilt").textContent =
						~~P.tilt + "°";

					document
						.querySelectorAll("[data-mode]")
						.forEach((b) =>
							b.classList.toggle("on", b.dataset.mode === P.mode),
						);

					seed = Math.random().toString(36).slice(2, 8).toUpperCase();
					document.getElementById("seed-el").textContent =
						"SEED: " + seed;
				});

			document
				.getElementById("btn-pause")
				.addEventListener("click", function () {
					P.paused = !P.paused;
					this.textContent = P.paused
						? "▶ \u00a0Play"
						: "⏸ \u00a0Pause";
				});

			document.getElementById("btn-dl").addEventListener("click", () => {
				const a = document.createElement("a");
				a.download = `tongji-120-${seed}.png`;
				a.href = canvas.toDataURL("image/png");
				a.click();
				const s = document.getElementById("status");
				s.classList.add("show");
				setTimeout(() => s.classList.remove("show"), 2000);
			});

			document.getElementById("seed-el").addEventListener("click", () => {
				navigator.clipboard?.writeText(seed);
			});
		</script>
	</body>
</html>
